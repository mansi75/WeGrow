# --- DataSource: read from env on Render; fallback for local dev ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wegrowdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# On Render, PORT is injected; locally fallback to 8081
server.port=${PORT:8081}

# JWT
jwt.secret=${JWT_SECRET:change-this-secret-please-0123456789}
jwt.issuer=wegrow
jwt.expMinutes=120
