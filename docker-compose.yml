version: "3.9"
services:
  db:
    image: postgres:16
    container_name: wegrow-postgres
    environment:
      POSTGRES_DB: wegrow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_wegrow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d wegrow"]
      interval: 5s
      timeout: 3s
      retries: 10

    backend:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: wegrow-backend
      depends_on:
        db:
          condition: service_healthy
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wegrow
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
        SERVER_PORT: 8081
      ports:
        - "8081:8081"

  # backend:
  #   build: ./backend          # path where your Spring Boot Dockerfile is
  #   container_name: wegrow-backend
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wegrow
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
  #     SERVER_PORT: 8081
  #   ports:
  #     - "8081:8081"
  #   # if you also build frontend in this image, just keep your existing Dockerfile

volumes:
  pgdata_wegrow:
